<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#050505" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Grand Regent" />
  <title>Grand Regent — Command Center v5</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;900&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    :root {
      --bg:#050505; --surface:#0a0a0a; --s2:#0d0b06; --s3:#0f0d08;
      --border:#1a1a1a; --bg:#1a1500;
      --text:#e8e0cc; --muted:#4a4030; --dim:#2a2010;
      --gold:#C9A84C; --gold2:#E8C870; --gold3:#F5DFA0;
      --gdim:#7a6530; --red:#c94c4c; --green:#4cc97a; --blue:#4c8ec9; --purple:#9c6fc9;
    }
    html,body { height:100%; background:#050505; color:var(--text); font-family:'DM Sans',sans-serif; overflow-x:hidden; }
    ::-webkit-scrollbar { width:3px; } ::-webkit-scrollbar-thumb { background:#2a2010; border-radius:2px; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    @keyframes shimmer { 0%{transform:translateX(-100%)} 100%{transform:translateX(300%)} }
    @keyframes spin { to{transform:rotate(360deg)} }
    @keyframes glow { 0%,100%{box-shadow:0 0 10px #C9A84C22} 50%{box-shadow:0 0 25px #C9A84C44} }

    /* SETUP */
    #setup { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; padding:40px 20px; text-align:center; background:radial-gradient(ellipse at 50% 0%,#1a1200,#050505 65%); }
    .s-crown { font-size:56px; margin-bottom:16px; filter:drop-shadow(0 0 20px #C9A84C99); }
    .s-title { font-family:'Cinzel',serif; font-size:26px; font-weight:900; color:var(--gold2); letter-spacing:0.12em; margin-bottom:4px; text-shadow:0 0 30px #C9A84C55; }
    .s-sub { font-family:'JetBrains Mono',monospace; font-size:9px; color:var(--gdim); letter-spacing:0.3em; margin-bottom:28px; }
    .s-card { width:100%; max-width:380px; background:linear-gradient(135deg,#0f0d08,#0a0800); border:1px solid #2a2010; border-radius:16px; padding:20px; margin-bottom:18px; }
    .s-step { display:flex; gap:10px; align-items:flex-start; margin-bottom:12px; text-align:left; }
    .s-step:last-child { margin-bottom:0; }
    .s-n { background:linear-gradient(135deg,var(--gold),var(--gold2)); color:#000; border-radius:50%; width:19px; height:19px; display:flex; align-items:center; justify-content:center; font-family:'Cinzel',serif; font-weight:700; font-size:8px; flex-shrink:0; margin-top:2px; }
    .s-t { font-size:12px; line-height:1.6; color:#887755; }
    .s-t a { color:var(--gold); text-decoration:none; }
    .s-inp { width:100%; max-width:380px; background:#0a0800; border:1px solid #2a2010; border-radius:12px; padding:13px 15px; color:var(--text); font-size:13px; font-family:'JetBrains Mono',monospace; margin-bottom:12px; }
    .s-inp:focus { outline:none; border-color:var(--gold); }
    .s-btn { width:100%; max-width:380px; padding:14px; border:none; border-radius:12px; color:#000; font-family:'Cinzel',serif; font-weight:700; font-size:12px; letter-spacing:0.1em; cursor:pointer; background:linear-gradient(135deg,#6a4a10,var(--gold),#F0D070,var(--gold),#6a4a10); animation:glow 2s infinite; }
    .s-note { color:#2a2010; font-size:9px; margin-top:10px; font-family:'JetBrains Mono',monospace; }

    /* APP */
    #app { display:none; flex-direction:column; min-height:100vh; }

    /* TOPBAR */
    .topbar { background:linear-gradient(180deg,#0e0c07,#050505); border-bottom:1px solid #1a1500; padding:11px 12px; position:sticky; top:0; z-index:200; display:flex; align-items:center; gap:8px; box-shadow:0 2px 20px #00000099; }
    .t-logo { font-size:20px; filter:drop-shadow(0 0 6px #C9A84C88); flex-shrink:0; }
    .t-titles { flex:1; min-width:0; }
    .t-name { font-family:'Cinzel',serif; font-size:14px; font-weight:900; color:var(--gold2); letter-spacing:0.08em; line-height:1; }
    .t-tag { font-family:'JetBrains Mono',monospace; font-size:7px; color:var(--gdim); letter-spacing:0.18em; margin-top:2px; }
    .t-nav { display:flex; gap:4px; flex-wrap:nowrap; }
    .n-pill { padding:5px 9px; border-radius:6px; border:1px solid #2a2010; font-family:'Cinzel',serif; font-weight:600; font-size:8px; letter-spacing:0.05em; cursor:pointer; transition:all 0.2s; white-space:nowrap; }
    .n-pill.active { background:linear-gradient(135deg,#7a5520,var(--gold)); color:#000; border-color:var(--gold); }
    .n-pill:not(.active) { background:transparent; color:var(--gdim); }
    .t-gear { width:27px; height:27px; border-radius:6px; border:1px solid #2a2010; background:transparent; color:var(--gdim); cursor:pointer; font-size:11px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }

    /* MAIN */
    .main { flex:1; padding:13px 11px 110px; max-width:800px; margin:0 auto; width:100%; }

    /* EMPIRE HEADER */
    .emp-hdr { background:linear-gradient(135deg,#0f0d08,#080600); border:1px solid #2a2010; border-radius:14px; padding:14px; margin-bottom:11px; position:relative; overflow:hidden; }
    .emp-hdr::before { content:''; position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(90deg,transparent,var(--gold),transparent); }
    .emp-week { font-family:'JetBrains Mono',monospace; font-size:7px; color:var(--gdim); letter-spacing:0.18em; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; }
    .reset-wk { font-family:'JetBrains Mono',monospace; font-size:7px; color:var(--red); border:1px solid #c94c4c33; border-radius:4px; padding:2px 7px; background:transparent; cursor:pointer; }
    .emp-metrics { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
    .em { text-align:center; }
    .em-lbl { font-family:'JetBrains Mono',monospace; font-size:7px; color:var(--muted); letter-spacing:0.12em; margin-bottom:4px; }
    .em-val { font-family:'Cinzel',serif; font-size:17px; font-weight:700; line-height:1; }
    .em-val.g { color:var(--green); text-shadow:0 0 10px #4cc97a33; }
    .em-val.r { color:var(--red); }
    .em-val.gold { color:var(--gold2); text-shadow:0 0 10px #C9A84C33; }
    .em-sub { font-size:8px; color:var(--muted); margin-top:2px; font-family:'JetBrains Mono',monospace; }

    /* SEC LABEL */
    .sec { font-family:'JetBrains Mono',monospace; font-size:7px; color:var(--gdim); letter-spacing:0.28em; margin:12px 0 7px; display:flex; align-items:center; gap:7px; }
    .sec::after { content:''; flex:1; height:1px; background:linear-gradient(90deg,#2a2010,transparent); }

    /* CMD CARDS */
    .cmd { background:linear-gradient(160deg,#0d0b06,#080600); border:1px solid #2a2010; border-radius:13px; margin-bottom:8px; overflow:hidden; position:relative; transition:border-color 0.2s; }
    .cmd.active { border-color:var(--gold); box-shadow:0 0 18px #C9A84C11; }
    .cmd.running::before { content:''; position:absolute; top:0; left:-100%; width:50%; height:1px; background:linear-gradient(90deg,transparent,var(--gold),transparent); animation:shimmer 1.5s linear infinite; }
    .cmd-archive { border-color:#9c6fc933; }
    .cmd-archive.active { border-color:var(--purple); box-shadow:0 0 18px #9c6fc911; }

    .ch { display:flex; align-items:center; padding:11px 11px; gap:9px; cursor:pointer; user-select:none; }
    .ch:active { opacity:0.75; }
    .ce { font-size:17px; flex-shrink:0; }
    .ci { flex:1; min-width:0; }
    .ct { font-family:'JetBrains Mono',monospace; font-size:7px; color:var(--gdim); letter-spacing:0.12em; }
    .cn { font-family:'Cinzel',serif; font-size:11px; color:var(--gold3); font-weight:600; line-height:1.2; }
    .cn.purple { color:#c9a8f5; }
    .cr { display:flex; align-items:center; gap:5px; }
    .mp { background:#080500; border:1px solid #2a2010; border-radius:5px; padding:3px 6px; min-width:44px; text-align:center; }
    .mp-l { font-family:'JetBrains Mono',monospace; font-size:6px; color:var(--muted); letter-spacing:0.08em; }
    .mp-v { font-family:'Cinzel',serif; font-size:10px; font-weight:600; }
    .mp-v.g { color:var(--green); } .mp-v.r { color:var(--red); } .mp-v.gold { color:var(--gold); } .mp-v.purple { color:var(--purple); }
    .chev { font-size:8px; color:var(--gdim); transition:transform 0.2s; flex-shrink:0; }
    .chev.o { transform:rotate(180deg); }

    /* CARD BODY */
    .cb { display:none; border-top:1px solid #1a1500; }
    .cb.open { display:block; animation:fadeUp 0.2s ease; }
    .btabs { display:flex; border-bottom:1px solid #1a1500; overflow-x:auto; }
    .btab { flex:1; min-width:60px; padding:7px 4px; font-family:'JetBrains Mono',monospace; font-size:7px; letter-spacing:0.08em; text-align:center; cursor:pointer; color:var(--muted); border:none; background:transparent; transition:all 0.2s; white-space:nowrap; }
    .btab.active { color:var(--gold); border-bottom:1px solid var(--gold); background:#0a0800; }
    .btab.purple-tab.active { color:var(--purple); border-bottom-color:var(--purple); }
    .tp { display:none; padding:13px; }
    .tp.active { display:block; animation:fadeUp 0.2s ease; }

    /* FUNDS */
    .fg { display:grid; grid-template-columns:repeat(3,1fr); gap:7px; margin-bottom:9px; }
    .fl { font-family:'JetBrains Mono',monospace; font-size:7px; color:var(--muted); letter-spacing:0.08em; margin-bottom:3px; }
    .fi { width:100%; background:#080500; border:1px solid #2a2010; border-radius:7px; padding:7px; color:var(--text); font-size:13px; font-family:'Cinzel',serif; text-align:center; }
    .fi:focus { outline:none; border-color:var(--gold); }
    .pw { margin-bottom:9px; }
    .pl { display:flex; justify-content:space-between; margin-bottom:3px; }
    .pl span { font-family:'JetBrains Mono',monospace; font-size:7px; color:var(--muted); }
    .pt { height:3px; background:#1a1500; border-radius:2px; overflow:hidden; }
    .pf { height:100%; background:linear-gradient(90deg,#6a4a10,var(--gold2)); border-radius:2px; transition:width 0.5s; }
    .ni { width:100%; background:#080500; border:1px solid #2a2010; border-radius:7px; padding:9px; color:#887766; font-size:12px; font-family:'DM Sans',sans-serif; resize:none; margin-bottom:9px; line-height:1.5; }
    .ni:focus { outline:none; border-color:var(--gold); }
    .sb { width:100%; padding:9px; background:linear-gradient(135deg,#6a4a10,var(--gold)); border:none; border-radius:7px; color:#000; font-family:'Cinzel',serif; font-weight:700; font-size:9px; letter-spacing:0.08em; cursor:pointer; }

    /* AI */
    .ai-i { width:100%; background:#080500; border:1px solid #2a2010; border-radius:9px; padding:10px; color:var(--text); font-size:13px; resize:none; font-family:'DM Sans',sans-serif; line-height:1.5; min-height:65px; margin-bottom:7px; }
    .ai-i:focus { outline:none; border-color:var(--gold); }
    .ai-b { width:100%; padding:10px; border:none; border-radius:9px; font-family:'Cinzel',serif; font-weight:700; font-size:9px; letter-spacing:0.08em; cursor:pointer; color:#000; background:linear-gradient(135deg,#6a4a10,var(--gold),#6a4a10); }
    .ai-b:disabled { background:#1a1500 !important; color:#3a3020; cursor:not-allowed; }
    .ai-o { margin-top:9px; background:#050400; border:1px solid #2a2010; border-radius:9px; padding:11px; font-size:12px; line-height:1.8; color:#998870; white-space:pre-wrap; word-break:break-word; display:none; }
    .ai-o.show { display:block; animation:fadeUp 0.3s ease; }

    /* HISTORY */
    .he { background:#080500; border:1px solid #2a2010; border-radius:8px; padding:10px; margin-bottom:7px; position:relative; }
    .he-starred { border-color:var(--gold); }
    .he-q { font-size:10px; color:var(--gdim); margin-bottom:5px; font-family:'Cinzel',serif; }
    .he-a { font-size:11px; color:#776655; line-height:1.6; white-space:pre-wrap; word-break:break-word; max-height:80px; overflow:hidden; position:relative; }
    .he-a.expanded { max-height:none; }
    .he-footer { display:flex; justify-content:space-between; align-items:center; margin-top:6px; }
    .he-time { font-family:'JetBrains Mono',monospace; font-size:7px; color:var(--dim); }
    .he-actions { display:flex; gap:5px; }
    .he-star { background:transparent; border:1px solid #2a2010; border-radius:4px; padding:2px 6px; font-size:9px; cursor:pointer; color:var(--muted); }
    .he-star.starred { color:var(--gold); border-color:var(--gold); }
    .he-expand { background:transparent; border:1px solid #2a2010; border-radius:4px; padding:2px 6px; font-size:8px; cursor:pointer; color:var(--muted); font-family:'JetBrains Mono',monospace; }
    .he-empty { text-align:center; padding:18px; color:var(--dim); font-family:'JetBrains Mono',monospace; font-size:8px; letter-spacing:0.1em; }

    /* ARCHIVE AI */
    .archive-search { width:100%; background:#080500; border:1px solid #9c6fc933; border-radius:9px; padding:10px; color:var(--text); font-size:13px; font-family:'DM Sans',sans-serif; margin-bottom:8px; }
    .archive-search:focus { outline:none; border-color:var(--purple); }
    .archive-actions { display:grid; grid-template-columns:repeat(2,1fr); gap:7px; margin-bottom:10px; }
    .arc-btn { padding:9px; border:1px solid #9c6fc933; border-radius:8px; background:#080500; color:#c9a8f5; font-family:'Cinzel',serif; font-weight:600; font-size:9px; letter-spacing:0.06em; cursor:pointer; text-align:center; transition:all 0.2s; }
    .arc-btn:active { background:#9c6fc922; }
    .arc-ai-btn { width:100%; padding:10px; border:none; border-radius:9px; font-family:'Cinzel',serif; font-weight:700; font-size:9px; letter-spacing:0.08em; cursor:pointer; color:#000; background:linear-gradient(135deg,#4a2080,var(--purple),#c9a8f5,var(--purple),#4a2080); margin-top:8px; }
    .arc-ai-btn:disabled { background:#1a1500 !important; color:#3a3020; cursor:not-allowed; }
    .arc-out { margin-top:9px; background:#050400; border:1px solid #9c6fc933; border-radius:9px; padding:11px; font-size:12px; line-height:1.8; color:#9988bb; white-space:pre-wrap; word-break:break-word; display:none; }
    .arc-out.show { display:block; animation:fadeUp 0.3s ease; }
    .arc-result { background:#080500; border:1px solid #9c6fc933; border-radius:8px; padding:10px; margin-bottom:7px; }
    .arc-result-agent { font-family:'Cinzel',serif; font-size:9px; color:var(--purple); margin-bottom:4px; }
    .arc-result-q { font-size:10px; color:var(--gdim); margin-bottom:4px; }
    .arc-result-a { font-size:11px; color:#665577; line-height:1.6; max-height:60px; overflow:hidden; }
    .arc-result-time { font-family:'JetBrains Mono',monospace; font-size:7px; color:var(--dim); margin-top:4px; }

    /* STANDBY */
    .sbc { background:#080600; border:1px dashed #2a2010; border-radius:13px; padding:16px; text-align:center; cursor:pointer; margin-bottom:8px; }
    .sbc:active { opacity:0.7; }
    .sbi { font-size:24px; margin-bottom:7px; opacity:0.3; }
    .sbt { font-family:'Cinzel',serif; font-size:9px; color:#2a2010; letter-spacing:0.1em; }
    .asgn-panel { background:#0a0800; border:1px solid #2a2010; border-radius:11px; padding:13px; margin-top:7px; display:none; animation:fadeUp 0.2s ease; }
    .asgn-i { width:100%; background:#080500; border:1px solid #2a2010; border-radius:7px; padding:9px; color:var(--text); font-size:13px; font-family:'DM Sans',sans-serif; margin-bottom:7px; }
    .asgn-i:focus { outline:none; border-color:var(--gold); }
    .asgn-b { width:100%; padding:9px; background:linear-gradient(135deg,#6a4a10,var(--gold)); border:none; border-radius:7px; color:#000; font-family:'Cinzel',serif; font-weight:700; font-size:9px; letter-spacing:0.08em; cursor:pointer; }

    /* DEPLOY */
    .dep-banner { background:linear-gradient(135deg,#0f0d08,#080600); border:1px solid #2a2010; border-radius:14px; padding:16px; margin-bottom:11px; text-align:center; position:relative; overflow:hidden; }
    .dep-banner::before { content:''; position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(90deg,transparent,var(--gold),transparent); }
    .dep-title { font-family:'Cinzel',serif; font-size:13px; color:var(--gold2); letter-spacing:0.1em; margin-bottom:3px; }
    .dep-sub { font-family:'JetBrains Mono',monospace; font-size:7px; color:var(--muted); letter-spacing:0.12em; }
    .dep-i { width:100%; background:#080500; border:1px solid #2a2010; border-radius:9px; padding:11px; color:var(--text); font-size:13px; resize:none; font-family:'DM Sans',sans-serif; line-height:1.5; min-height:85px; margin:10px 0 9px; }
    .dep-i:focus { outline:none; border-color:var(--gold); }
    .dep-btn { width:100%; padding:13px; border:none; border-radius:11px; font-family:'Cinzel',serif; font-weight:700; font-size:11px; letter-spacing:0.1em; cursor:pointer; color:#000; background:linear-gradient(135deg,#4a3008,var(--gold),#F0D070,var(--gold),#4a3008); }
    .dep-btn:disabled { background:#1a1500; color:#3a3020; cursor:not-allowed; }
    .dep-res { background:linear-gradient(160deg,#0d0b06,#080600); border:1px solid #2a2010; border-radius:11px; padding:13px; margin-bottom:9px; animation:fadeUp 0.3s ease; border-left:2px solid var(--gold); }
    .dep-res-hdr { display:flex; align-items:center; gap:7px; margin-bottom:9px; flex-wrap:wrap; }
    .dep-res-txt { font-size:12px; line-height:1.8; color:#887766; white-space:pre-wrap; word-break:break-word; }

    .spinner { width:12px; height:12px; border:2px solid #2a2010; border-top-color:var(--gold); border-radius:50%; animation:spin 0.7s linear infinite; display:inline-block; vertical-align:middle; }
    .spinner-purple { border-top-color:var(--purple); }
    .toast { position:fixed; bottom:18px; left:50%; transform:translateX(-50%); background:#0d0b06; border:1px solid var(--gold); border-radius:18px; padding:8px 18px; font-size:10px; color:var(--gold2); z-index:999; animation:fadeUp 0.3s ease; white-space:nowrap; font-family:'JetBrains Mono',monospace; letter-spacing:0.05em; }
  </style>
</head>
<body>

<!-- SETUP -->
<div id="setup">
  <div class="s-crown">👑</div>
  <div class="s-title">GRAND REGENT</div>
  <div class="s-sub">COMMAND CENTER v5</div>
  <div class="s-card">
    <div class="s-step"><div class="s-n">I</div><div class="s-t">Go to <a href="https://aistudio.google.com" target="_blank">aistudio.google.com</a> → sign in with Gmail</div></div>
    <div class="s-step"><div class="s-n">II</div><div class="s-t">Tap <strong style="color:var(--gold)">"Get API Key"</strong> → <strong style="color:var(--gold)">"Create API key"</strong> → copy it</div></div>
    <div class="s-step"><div class="s-n">III</div><div class="s-t">Paste below. Stored only on this device. Never transmitted.</div></div>
  </div>
  <input class="s-inp" id="api-key-input" type="password" placeholder="Paste Gemini API key (AIza...)" />
  <button class="s-btn" onclick="saveKey()">ENTER THE COMMAND CENTER</button>
  <p class="s-note">// KEY STORED LOCALLY · NEVER SHARED · FREE TIER · v5</p>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="t-logo">👑</div>
    <div class="t-titles">
      <div class="t-name">GRAND REGENT</div>
      <div class="t-tag">COMMAND CENTER v5</div>
    </div>
    <div class="t-nav">
      <button class="n-pill active" id="btn-cmd" onclick="setView('cmd')">CMD</button>
      <button class="n-pill" id="btn-archive" onclick="setView('archive')" style="border-color:#9c6fc933;color:#9c6fc9">📚</button>
      <button class="n-pill" id="btn-deploy" onclick="setView('deploy')">⚡</button>
    </div>
    <button class="t-gear" onclick="resetKey()">⚙</button>
  </div>
  <div class="main" id="main"></div>
</div>

<script>
// ── AGENTS ──
const AGENTS = [
  { id:'orchestrator', name:'Empire Orchestrator', emoji:'👑', tag:'MASTER CONTROL',
    prompt:`You are the Grand Regent — Master Orchestrator of a 9-agent online income empire. Agents: Risk Manager, Dropship Store, Video Content, Trading Advisor, Innovation, Trend Spotter, Archive Intelligence, and Standby units. For any goal: 1) Empire-wide strategic breakdown, 2) Which agents to activate and order, 3) Priorities and timeline, 4) Risks, 5) Top 3 next moves. Be decisive. Think like a CEO building from zero in South Africa.` },
  { id:'risk', name:'Risk Manager', emoji:'⚠️', tag:'RISK CONTROL',
    prompt:`You are a risk management expert for a South African digital entrepreneur. For any decision or plan: 1) Risk Level (Low/Medium/High/Critical), 2) Top 5 specific risks, 3) Worst-case scenario, 4) Best-case scenario, 5) 3 mitigation strategies, 6) GO/WAIT/NO-GO verdict. Be brutally honest.` },
  { id:'dropship', name:'Dropship Store', emoji:'🛒', tag:'STORE OPS',
    prompt:`You are a dropshipping expert for 2025/2026. Given a niche/product: 1) Top 3 winning products with demand signals, 2) Pricing strategy with margins, 3) Ready Shopify listing (title, description, 5 bullets), 4) Upsell opportunities, 5) Best platform. Focus on SA and global markets.` },

  { id:'trends', name:'Trend Spotter', emoji:'🔎', tag:'INTEL OPS',

  { id:'archive', name:'Archive Intelligence', emoji:'📚', tag:'ARCHIVE AI', isArchive:true,
    prompt:`You are the Archive Intelligence for the Grand Regent empire. You have access to conversation history across all 8 agents. When asked to: SEARCH — find relevant past conversations by keyword or topic. SUMMARIZE — give a concise weekly summary of all agent activity. INSIGHTS — identify patterns, recurring themes, opportunities, and risks across all agent interactions. RECOMMEND — based on history, suggest what actions the Grand Regent should take next. Be analytical, precise, and strategic.` },
  { id:'standbyA', name:'Standby Unit A', emoji:'🔒', tag:'UNASSIGNED', standby:true, prompt:'' },
  { id:'standbyB', name:'Standby Unit B', emoji:'🔒', tag:'UNASSIGNED', standby:true, prompt:'' },
];

// ── STATE ──
let apiKey = localStorage.getItem('gr5_key') || '';
let currentView = 'cmd';
let expandedId = null;
let activeTab = {};
let funds = JSON.parse(localStorage.getItem('gr5_funds') || '{}');
let notes = JSON.parse(localStorage.getItem('gr5_notes') || '{}');
let history = JSON.parse(localStorage.getItem('gr5_history') || '{}');
let starred = JSON.parse(localStorage.getItem('gr5_starred') || '{}');
let custom = JSON.parse(localStorage.getItem('gr5_custom') || '{}');
let weekLabel = localStorage.getItem('gr5_week') || getWeek();

AGENTS.forEach(a => {
  if (custom[a.id]) { Object.assign(a, custom[a.id]); a.standby = false; }
  if (!funds[a.id]) funds[a.id] = {rev:0,spent:0};
  if (!notes[a.id]) notes[a.id] = '';
  if (!history[a.id]) history[a.id] = [];
  if (!starred[a.id]) starred[a.id] = {};
  if (!activeTab[a.id]) activeTab[a.id] = 'funds';
});

function getWeek() {
  const d = new Date(), s = new Date(d.getFullYear(),0,1);
  return `W${Math.ceil(((d-s)/86400000+s.getDay()+1)/7)} ${d.getFullYear()}`;
}
const R = n => `R${(+n).toLocaleString('en-ZA',{minimumFractionDigits:0,maximumFractionDigits:0})}`;
function getTotals() {
  let rev=0,spent=0;
  AGENTS.filter(a=>!a.standby&&!a.isArchive).forEach(a=>{rev+=+funds[a.id]?.rev||0;spent+=+funds[a.id]?.spent||0;});
  return {rev,spent,profit:rev-spent};
}
function getAllHistory() {
  let all = [];
  AGENTS.forEach(a => {
    (history[a.id]||[]).forEach(h => all.push({...h, agentName:a.name, agentId:a.id}));
  });
  return all.sort((a,b) => new Date(b.time)-new Date(a.time));
}
function getStarredHistory() {
  let all = [];
  AGENTS.forEach(a => {
    (history[a.id]||[]).forEach((h,i) => {
      if (starred[a.id]?.[i]) all.push({...h, agentName:a.name, agentId:a.id, idx:i});
    });
  });
  return all;
}

// ── INIT ──
window.onload = () => { if (apiKey) showApp(); };
function saveKey() {
  const v = document.getElementById('api-key-input').value.trim();
  if (!v||!v.startsWith('AIza')) { showToast('⚠ Key must start with AIza...'); return; }
  localStorage.setItem('gr5_key',v); apiKey=v; showApp();
}
function resetKey() { if(confirm('Reset API key?')){ localStorage.removeItem('gr5_key'); location.reload(); } }
function showApp() {
  document.getElementById('setup').style.display='none';
  document.getElementById('app').style.display='flex';
  render();
}
function setView(v) {
  currentView=v;
  ['cmd','archive','deploy'].forEach(x => document.getElementById(`btn-${x}`)?.classList.toggle('active',x===v));
  render();
}

// ── RENDER ──
function render() {
  const m = document.getElementById('main');
  if (currentView==='cmd') m.innerHTML = renderCmd();
  else if (currentView==='archive') m.innerHTML = renderArchiveView();
  else m.innerHTML = renderDeploy();
}

function renderCmd() {
  const t = getTotals();
  const header = `
    <div class="emp-hdr">
      <div class="emp-week">
        <span>// WEEKLY OVERVIEW · ${weekLabel}</span>
        <button class="reset-wk" onclick="resetWeek()">RESET WEEK</button>
      </div>
      <div class="emp-metrics">
        <div class="em"><div class="em-lbl">REVENUE</div><div class="em-val g">${R(t.rev)}</div><div class="em-sub">earned</div></div>
        <div class="em"><div class="em-lbl">PROFIT</div><div class="em-val ${t.profit>=0?'g':'r'}">${R(t.profit)}</div><div class="em-sub">${t.profit>=0?'positive':'negative'}</div></div>
        <div class="em"><div class="em-lbl">SPENT</div><div class="em-val gold">${R(t.spent)}</div><div class="em-sub">expenses</div></div>
      </div>
    </div>`;

  const active = AGENTS.filter(a=>!a.standby&&!a.isArchive);
  const archiveAgent = AGENTS.find(a=>a.isArchive);
  const standby = AGENTS.filter(a=>a.standby);
  const maxRev = Math.max(...active.map(a=>+funds[a.id]?.rev||0),1);

  const cards = active.map(a => renderAgentCard(a, maxRev)).join('');
  const archiveCard = renderArchiveCard(archiveAgent);
  const standbys = standby.map(a => renderStandby(a)).join('');

  return `${header}
    <div class="sec">ACTIVE UNITS</div>${cards}
    <div class="sec">ARCHIVE INTELLIGENCE</div>${archiveCard}
    <div class="sec">STANDBY UNITS</div>${standbys}`;
}

function renderAgentCard(a, maxRev) {
  const f = funds[a.id];

  const prog = Math.min(((+f.rev||0)/maxRev)*100,100);
  const isOpen = expandedId===a.id;
  const tab = activeTab[a.id]||'funds';
  const hist = history[a.id]||[];

  return `
    <div class="cmd${isOpen?' active':''}" id="card-${a.id}">
      <div class="ch" onclick="toggleCard('${a.id}')">
        <div class="ce">${a.emoji}</div>
        <div class="ci"><div class="ct">${a.tag}</div><div class="cn">${a.name}</div></div>
        <div class="cr">
          <div class="mp"><div class="mp-l">REV</div><div class="mp-v g">${R(f.rev||0)}</div></div>
          <div class="mp"><div class="mp-l">P/L</div><div class="mp-v ${profit>=0?'g':'r'}">${R(profit)}</div></div>
        </div>
        <div class="chev${isOpen?' o':''}">▼</div>
      </div>
      <div class="cb${isOpen?' open':''}">
        <div class="btabs">
          <button class="btab${tab==='funds'?' active':''}" onclick="setTab('${a.id}','funds')">FUNDS</button>
          <button class="btab${tab==='ai'?' active':''}" onclick="setTab('${a.id}','ai')">CONSULT</button>
          <button class="btab${tab==='history'?' active':''}" onclick="setTab('${a.id}','history')">HISTORY(${hist.length})</button>
        </div>
        <div class="tp${tab==='funds'?' active':''}" id="tp-f-${a.id}">
          <div class="pw">
            <div class="pl"><span>REVENUE SHARE</span><span>${prog.toFixed(0)}%</span></div>
            <div class="pt"><div class="pf" style="width:${prog}%"></div></div>
          </div>
          <div class="fg">
            <div><div class="fl">REVENUE (R)</div><input class="fi" type="number" id="rev-${a.id}" value="${f.rev||0}" min="0"/></div>
            <div><div class="fl">SPENT (R)</div><input class="fi" type="number" id="spent-${a.id}" value="${f.spent||0}" min="0"/></div>
            <div><div class="fl">PROFIT (R)</div><input class="fi" readonly value="${profit.toFixed(0)}" style="color:${profit>=0?'var(--green)':'var(--red)'}"/></div>
          </div>
          <div class="fl" style="margin-bottom:4px">NOTES</div>
          <textarea class="ni" id="notes-${a.id}" rows="2" placeholder="Track progress, tasks, wins...">${notes[a.id]||''}</textarea>
          <button class="sb" onclick="saveFunds('${a.id}')">SAVE FUNDS & NOTES</button>
        </div>
        <div class="tp${tab==='ai'?' active':''}" id="tp-ai-${a.id}">
          <div style="font-family:'JetBrains Mono',monospace;font-size:7px;color:var(--gdim);letter-spacing:0.12em;margin-bottom:7px">// CONSULT ${a.tag}</div>
          <textarea class="ai-i" id="ai-inp-${a.id}" placeholder="Ask ${a.name}..." rows="3"></textarea>
          <button class="ai-b" id="ai-btn-${a.id}" onclick="runAgent('${a.id}')">DEPLOY ${a.name.toUpperCase().substring(0,18)} →</button>
          <div class="ai-o" id="ai-out-${a.id}"></div>
        </div>
        <div class="tp${tab==='history'?' active':''}" id="tp-h-${a.id}">
          ${hist.length===0
            ? '<div class="he-empty">// NO HISTORY YET</div>'
            : hist.slice().reverse().map((h,ri) => {
                const i = hist.length-1-ri;
                const isStarred = starred[a.id]?.[i];
                return `<div class="he${isStarred?' he-starred':''}">
                  <div class="he-q">Q: ${esc(h.q.substring(0,60))}${h.q.length>60?'...':''}</div>
                  <div class="he-a" id="hea-${a.id}-${i}">${esc(h.a)}</div>
                  <div class="he-footer">
                    <span class="he-time">${h.time}</span>
                    <div class="he-actions">
                      <button class="he-star${isStarred?' starred':''}" onclick="toggleStar('${a.id}',${i})">${isStarred?'★':'☆'}</button>
                      <button class="he-expand" onclick="expandEntry('${a.id}',${i})">READ</button>
                    </div>
                  </div>
                </div>`;
              }).join('')}
        </div>
      </div>
    </div>`;
}

          ${starredHist.length===0

            : starredHist.map(h => `
              <div class="arc-result">
                <div class="arc-result-agent">★ ${h.agentName}</div>

                <div class="arc-result-time">${h.time}</div>

        </div>

          ${allHist.length===0
            ? '<div class="he-empty">// NO HISTORY YET — START CONSULTING YOUR AGENTS</div>'
            : allHist.map(h => `
              <div class="arc-result">
                <div class="arc-result-agent">${h.agentName}</div>
                <div class="arc-result-q">${esc(h.q.substring(0,60))}${h.q.length>60?'...':''}</div>
                <div class="arc-result-a">${esc(h.a.substring(0,100))}...</div>
                <div class="arc-result-time">${h.time}</div>
              </div>`).join('')}
        </div>
      </div>
    </div>`;
}

  return `

// ── INTERACTIONS ──
function toggleCard(id) {
  expandedId = expandedId===id ? null : id;
  render();
  if (expandedId) setTimeout(()=>document.getElementById(`card-${id}`)?.scrollIntoView({behavior:'smooth',block:'start'}),100);
}
function setTab(id,tab) {
  activeTab[id]=tab; render();
  setTimeout(()=>document.getElementById(`card-${id}`)?.scrollIntoView({behavior:'smooth',block:'start'}),50);
}
function saveFunds(id) {
  funds[id]={rev:parseFloat(document.getElementById(`rev-${id}`)?.value||0),spent:parseFloat(document.getElementById(`spent-${id}`)?.value||0)};
  notes[id]=document.getElementById(`notes-${id}`)?.value||'';
  localStorage.setItem('gr5_funds',JSON.stringify(funds));
  localStorage.setItem('gr5_notes',JSON.stringify(notes));
  showToast('✓ FUNDS SAVED'); expandedId=id; activeTab[id]='funds'; render();
  setTimeout(()=>document.getElementById(`card-${id}`)?.scrollIntoView({behavior:'smooth',block:'start'}),100);
}
function resetWeek() {
  if(!confirm('Reset all weekly funds to zero?')) return;
  AGENTS.filter(a=>!a.isArchive).forEach(a=>{funds[a.id]={rev:0,spent:0};});
  weekLabel=getWeek(); localStorage.setItem('gr5_funds',JSON.stringify(funds)); localStorage.setItem('gr5_week',weekLabel);
  showToast('✓ WEEK RESET'); render();
}
function toggleAssign(id) {
  const p=document.getElementById(`assign-${id}`);
  if(p) p.style.display=p.style.display==='block'?'none':'block';
}
function assignAgent(id) {
  const name=document.getElementById(`aname-${id}`)?.value?.trim();
  const desc=document.getElementById(`adesc-${id}`)?.value?.trim();
  const role=document.getElementById(`arole-${id}`)?.value?.trim();
  if(!name||!role){showToast('⚠ Fill name and role');return;}
  const a=AGENTS.find(x=>x.id===id);
  const u={name,desc:desc||name,prompt:role,emoji:'⚡',tag:'COMMISSIONED',standby:false};
  Object.assign(a,u); custom[id]=u; funds[id]={rev:0,spent:0}; notes[id]=''; history[id]=[]; starred[id]={};
  localStorage.setItem('gr5_custom',JSON.stringify(custom)); localStorage.setItem('gr5_funds',JSON.stringify(funds));
  showToast(`✓ ${name} COMMISSIONED`); render();
}
function toggleStar(agentId, idx) {
  if(!starred[agentId]) starred[agentId]={};
  starred[agentId][idx] = !starred[agentId][idx];
  localStorage.setItem('gr5_starred',JSON.stringify(starred));
  showToast(starred[agentId][idx]?'★ STARRED':'☆ UNSTARRED'); render();
  expandedId=agentId; activeTab[agentId]='history'; render();
  setTimeout(()=>document.getElementById(`card-${agentId}`)?.scrollIntoView({behavior:'smooth',block:'start'}),100);
}
function expandEntry(agentId, idx) {
  const el = document.getElementById(`hea-${agentId}-${idx}`);
  if(el) el.classList.toggle('expanded');
}
function searchArchive() {
  const q = document.getElementById('arc-search-inp')?.value?.toLowerCase();
  const res = document.getElementById('arc-search-results');
  if(!res) return;
  if(!q||q.length<2){res.innerHTML='';return;}
  const matches = getAllHistory().filter(h=>h.q.toLowerCase().includes(q)||h.a.toLowerCase().includes(q));
  if(matches.length===0){res.innerHTML='<div class="he-empty">// NO MATCHES FOUND</div>';return;}
  res.innerHTML = matches.map(h=>`
    <div class="arc-result">
      <div class="arc-result-agent">${h.agentName}</div>
      <div class="arc-result-q">${esc(h.q.substring(0,60))}</div>
      <div class="arc-result-a">${esc(h.a.substring(0,100))}...</div>
      <div class="arc-result-time">${h.time}</div>
    </div>`).join('');
}
function searchArchiveMain() {
  const q = document.getElementById('arc-main-search')?.value?.toLowerCase();
  const res = document.getElementById('arc-main-results');
  if(!res) return;
  if(!q||q.length<2){res.innerHTML='';return;}
  const matches = getAllHistory().filter(h=>h.q.toLowerCase().includes(q)||h.a.toLowerCase().includes(q));
  if(matches.length===0){res.innerHTML='<div class="he-empty" style="color:var(--dim);font-family:JetBrains Mono,monospace;font-size:8px;padding:12px;text-align:center">// NO MATCHES</div>';return;}
  res.innerHTML = matches.map(h=>`
    <div class="arc-result" style="margin-bottom:7px">
      <div class="arc-result-agent">${h.agentName}</div>
      <div class="arc-result-q">${esc(h.q.substring(0,80))}</div>
      <div class="arc-result-a">${esc(h.a.substring(0,120))}...</div>
      <div class="arc-result-time">${h.time}</div>
    </div>`).join('');
}

// ── API ──
async function callGemini(prompt, message) {
  const res = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`,
    {method:'POST',headers:{'Content-Type':'application/json'},
     body:JSON.stringify({contents:[{parts:[{text:`${prompt}\n\nDirective: ${message}`}]}],generationConfig:{maxOutputTokens:1300,temperature:0.8}})}
  );
  const d = await res.json();
  if(d.error) throw new Error(d.error.message);
  return d.candidates?.[0]?.content?.parts?.[0]?.text||'No response.';
}

function buildArchiveContext() {
  const all = getAllHistory();
  if(all.length===0) return 'No history available yet.';
  const recent = all.slice(0,30);
  return recent.map(h=>`[${h.agentName}] Q: ${h.q}\nA: ${h.a.substring(0,300)}\n---`).join('\n');
}

async function runAgent(id) {
  const a = AGENTS.find(x=>x.id===id);
  const inp = document.getElementById(`ai-inp-${id}`)?.value?.trim();
  if(!inp){showToast('⚠ State your directive');return;}
  const btn=document.getElementById(`ai-btn-${id}`); const out=document.getElementById(`ai-out-${id}`);
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span> PROCESSING...';
  out.style.display='block'; out.classList.add('show');
  out.innerHTML='<span style="color:#3a3020;animation:pulse 1s infinite;display:inline-block">ANALYZING...</span>';
  try {
    const result = await callGemini(a.prompt, inp);
    out.innerHTML=esc(result); out.style.color='#998870';
    history[id]=history[id]||[];
    history[id].push({q:inp,a:result,time:new Date().toLocaleString('en-ZA')});
    if(history[id].length>15) history[id]=history[id].slice(-15);
    localStorage.setItem('gr5_history',JSON.stringify(history));
  } catch(e) { out.innerHTML=`⚠ ${e.message}`; out.style.color='var(--red)'; }
  btn.disabled=false; btn.innerHTML=`DEPLOY ${a.name.toUpperCase().substring(0,18)} →`;
}

async function runArchive() {
  const inp = document.getElementById('arc-custom-inp')?.value?.trim();
  if(!inp){showToast('⚠ State your query');return;}
  const btn=document.getElementById('arc-btn'); const out=document.getElementById('arc-out');
  await executeArchiveQuery(inp, btn, out, 'QUERY ARCHIVE INTELLIGENCE →');
}
async function runArchiveMain() {
  const inp = document.getElementById('arc-main-inp')?.value?.trim();
  if(!inp){showToast('⚠ State your query');return;}
  const btn=document.getElementById('arc-main-btn'); const out=document.getElementById('arc-main-out');
  await executeArchiveQuery(inp, btn, out, 'QUERY ARCHIVE INTELLIGENCE →');
}
async function archiveQuickAction(query) {
  const archiveAgent = AGENTS.find(a=>a.isArchive);
  expandedId = archiveAgent.id; activeTab[archiveAgent.id]='consult';
  render();
  setTimeout(async () => {
    const btn=document.getElementById('arc-btn'); const out=document.getElementById('arc-out');
    const inp=document.getElementById('arc-custom-inp');
    if(inp) inp.value=query;
    await executeArchiveQuery(query, btn, out, 'QUERY ARCHIVE INTELLIGENCE →');
  }, 200);
}
async function executeArchiveQuery(query, btn, out, btnLabel) {
  if(!btn||!out) return;
  btn.disabled=true; btn.innerHTML='<span class="spinner spinner-purple"></span> SEARCHING ARCHIVE...';
  out.style.display='block'; out.classList.add('show');
  out.innerHTML='<span style="color:#4a2080;animation:pulse 1s infinite;display:inline-block">PROCESSING ARCHIVE...</span>';
  try {
    const archiveAgent = AGENTS.find(a=>a.isArchive);
    const ctx = buildArchiveContext();
    const fullPrompt = `${archiveAgent.prompt}\n\nHere is the complete conversation history from all agents:\n\n${ctx}`;
    const result = await callGemini(fullPrompt, query);
    out.innerHTML=esc(result); out.style.color='#9988bb';
    history['archive']=history['archive']||[];
    history['archive'].push({q:query,a:result,time:new Date().toLocaleString('en-ZA')});
    localStorage.setItem('gr5_history',JSON.stringify(history));
  } catch(e) { out.innerHTML=`⚠ ${e.message}`; out.style.color='var(--red)'; }
  btn.disabled=false; btn.innerHTML=btnLabel;
}

async function runEmpire() {
  const inp=document.getElementById('dep-inp')?.value?.trim();
  if(!inp){showToast('⚠ State your directive');return;}
  const btn=document.getElementById('dep-btn'); btn.disabled=true; btn.innerHTML='⚡ MOBILIZING...';
  const out=document.getElementById('dep-out'); out.innerHTML='';
  const active=AGENTS.filter(a=>!a.standby&&!a.isArchive);
  let ctx='';
  for(let i=0;i<active.length;i++) {
    const a=active[i]; const cid=`dr-${a.id}`;
    out.innerHTML+=`<div class="dep-res" id="${cid}">
      <div class="dep-res-hdr"><span>${a.emoji}</span>
        <span style="font-family:'Cinzel',serif;font-weight:600;font-size:10px;color:var(--gold2)">${a.name}</span>
        <span style="font-family:'JetBrains Mono',monospace;font-size:7px;color:var(--muted);margin-left:auto">${a.tag}</span>
        <span><span class="spinner"></span></span>
      </div>
      <div style="color:#2a2010;font-size:11px;animation:pulse 1s infinite">PROCESSING...</div>
    </div>`;
    document.getElementById(cid)?.scrollIntoView({behavior:'smooth',block:'nearest'});
    try {
      const result=await callGemini(a.prompt,(ctx?`Strategic context:\n${ctx}\n\n`:'')+inp);
      if(i===0) ctx=result;
      document.getElementById(cid).innerHTML=`
        <div class="dep-res-hdr"><span>${a.emoji}</span>
          <span style="font-family:'Cinzel',serif;font-weight:600;font-size:10px;color:var(--gold2)">${a.name}</span>
          <span style="font-family:'JetBrains Mono',monospace;font-size:7px;color:var(--muted);margin-left:auto">${a.tag}</span>
          <span style="font-family:'JetBrains Mono',monospace;font-size:7px;color:var(--green)">COMPLETE ✓</span>
        </div>
        <div class="dep-res-txt">${esc(result)}</div>`;
      history[a.id]=history[a.id]||[];
      history[a.id].push({q:inp,a:result,time:new Date().toLocaleString('en-ZA')});
      if(history[a.id].length>15) history[a.id]=history[a.id].slice(-15);
    } catch(e) {
      document.getElementById(cid).innerHTML=`
        <div class="dep-res-hdr"><span>${a.emoji}</span><span style="font-family:'Cinzel',serif;font-size:10px;color:var(--gold2)">${a.name}</span></div>
        <div style="color:var(--red);font-size:11px">⚠ ${e.message}</div>`;
    }
  }
  localStorage.setItem('gr5_history',JSON.stringify(history));
  btn.disabled=false; btn.innerHTML='⚡ MOBILIZE ALL UNITS →';
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function showToast(msg){const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2500);}
</script>
