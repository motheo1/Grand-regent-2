<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#050505" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Grand Regent" />
  <title>Grand Regent — Command Center</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700;900&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #050505;
      --surface: #0a0a0a;
      --surface2: #0f0f0f;
      --border: #1a1a1a;
      --border2: #222;
      --text: #e8e0cc;
      --muted: #4a4030;
      --gold: #C9A84C;
      --gold2: #E8C870;
      --gold3: #F5DFA0;
      --gold-dim: #7a6530;
      --red: #c94c4c;
      --green: #4cc97a;
      --blue: #4c8ec9;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow-x: hidden; }
    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: #2a2010; border-radius: 2px; }

    @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    @keyframes shimmer { 0%{transform:translateX(-100%)} 100%{transform:translateX(300%)} }
    @keyframes spin { to{transform:rotate(360deg)} }
    @keyframes goldPulse { 0%,100%{box-shadow:0 0 8px #C9A84C33} 50%{box-shadow:0 0 20px #C9A84C66} }
    @keyframes scanline { 0%{top:0} 100%{top:100%} }

    /* SETUP */
    #setup {
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      min-height:100vh; padding:40px 24px; text-align:center;
      background: radial-gradient(ellipse at top, #1a1200 0%, #050505 70%);
    }
    .setup-crown { font-size:56px; margin-bottom:20px; filter:drop-shadow(0 0 20px #C9A84C88); }
    .setup-title {
      font-family:'Cinzel',serif; font-size:28px; font-weight:900;
      color: var(--gold2); letter-spacing:0.1em; margin-bottom:6px;
      text-shadow: 0 0 30px #C9A84C66;
    }
    .setup-sub2 { font-family:'Cinzel',serif; font-size:12px; color:var(--gold-dim); letter-spacing:0.3em; margin-bottom:32px; }
    .setup-steps { width:100%; max-width:380px; margin-bottom:28px; }
    .setup-step {
      background: linear-gradient(135deg, #0f0d08, #0a0800);
      border:1px solid #2a2010; border-radius:12px; padding:14px 16px;
      margin-bottom:10px; text-align:left; display:flex; gap:12px; align-items:flex-start;
    }
    .step-num {
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      color:#000; border-radius:50%; width:22px; height:22px;
      display:flex; align-items:center; justify-content:center;
      font-family:'Cinzel',serif; font-weight:700; font-size:10px; flex-shrink:0; margin-top:1px;
    }
    .step-text { font-size:13px; line-height:1.5; color:#998870; }
    .step-text a { color:var(--gold); text-decoration:none; }
    .setup-input {
      width:100%; max-width:380px; background:#0a0800; border:1px solid #2a2010;
      border-radius:12px; padding:14px 16px; color:var(--text);
      font-size:13px; font-family:'JetBrains Mono',monospace; margin-bottom:14px;
    }
    .setup-input:focus { outline:none; border-color:var(--gold); box-shadow:0 0 12px #C9A84C22; }
    .setup-btn {
      width:100%; max-width:380px; padding:15px;
      background: linear-gradient(135deg, #8a6820, #C9A84C, #E8C870, #C9A84C, #8a6820);
      background-size:200% auto;
      border:none; border-radius:12px; color:#000;
      font-family:'Cinzel',serif; font-weight:700; font-size:14px;
      letter-spacing:0.1em; cursor:pointer; animation:goldPulse 2s infinite;
    }
    .setup-note { color:#3a3020; font-size:11px; margin-top:14px; max-width:300px; font-family:'JetBrains Mono',monospace; }

    /* APP */
    #app { display:none; flex-direction:column; min-height:100vh; }

    /* TOP BAR */
    .topbar {
      background: linear-gradient(180deg, #0d0b06 0%, #050505 100%);
      border-bottom:1px solid #1a1500;
      padding:12px 16px; position:sticky; top:0; z-index:100;
      display:flex; align-items:center; justify-content:space-between;
      box-shadow: 0 2px 20px #00000088;
    }
    .topbar-left { display:flex; align-items:center; gap:10px; }
    .topbar-crown { font-size:20px; filter:drop-shadow(0 0 6px #C9A84C88); }
    .topbar-title { font-family:'Cinzel',serif; font-size:16px; font-weight:900; color:var(--gold2); letter-spacing:0.08em; }
    .topbar-sub { font-family:'JetBrains Mono',monospace; font-size:9px; color:var(--gold-dim); letter-spacing:0.2em; }
    .topbar-right { display:flex; gap:6px; align-items:center; }
    .nav-btn {
      padding:6px 12px; border-radius:6px; border:1px solid #2a2010;
      font-family:'Cinzel',serif; font-weight:600; font-size:9px; letter-spacing:0.08em;
      cursor:pointer; transition:all 0.2s;
    }
    .nav-btn.active { background:linear-gradient(135deg,#8a6820,#C9A84C); color:#000; border-color:var(--gold); }
    .nav-btn:not(.active) { background:transparent; color:var(--gold-dim); }
    .gear-btn {
      width:30px; height:30px; border-radius:6px; border:1px solid #2a2010;
      background:transparent; color:var(--gold-dim); cursor:pointer; font-size:13px;
      display:flex; align-items:center; justify-content:center;
    }

    /* MAIN */
    .main { flex:1; padding:14px 12px 100px; max-width:800px; margin:0 auto; width:100%; }

    /* EMPIRE STATS BAR */
    .empire-stats {
      display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:14px;
    }
    .stat-card {
      background:linear-gradient(135deg,#0d0b06,#0a0800);
      border:1px solid #2a2010; border-radius:10px; padding:12px 10px; text-align:center;
    }
    .stat-label { font-family:'JetBrains Mono',monospace; font-size:8px; color:var(--gold-dim); letter-spacing:0.2em; margin-bottom:6px; }
    .stat-value { font-family:'Cinzel',serif; font-size:16px; font-weight:700; }
    .stat-value.green { color:var(--green); text-shadow:0 0 10px #4cc97a44; }
    .stat-value.red { color:var(--red); }
    .stat-value.gold { color:var(--gold2); text-shadow:0 0 10px #C9A84C44; }
    .stat-change { font-size:10px; color:var(--muted); margin-top:3px; font-family:'JetBrains Mono',monospace; }

    /* SECTION TITLE */
    .section-title {
      font-family:'Cinzel',serif; font-size:11px; color:var(--gold-dim);
      letter-spacing:0.3em; margin-bottom:10px; padding-left:2px;
      display:flex; align-items:center; gap:8px;
    }
    .section-title::after { content:''; flex:1; height:1px; background:linear-gradient(90deg,#2a2010,transparent); }

    /* AGENT COMMAND CARDS */
    .command-grid { display:flex; flex-direction:column; gap:10px; margin-bottom:14px; }
    .command-card {
      background:linear-gradient(135deg,#0d0b06,#080600);
      border:1px solid #2a2010; border-radius:14px; overflow:hidden;
      transition:all 0.2s; position:relative;
    }
    .command-card.selected { border-color:var(--gold); box-shadow:0 0 20px #C9A84C1a; }
    .command-card.running { animation:goldPulse 1s infinite; }
    .command-card.running::before {
      content:''; position:absolute; top:0; left:-100%; width:50%; height:1px;
      background:linear-gradient(90deg,transparent,var(--gold),transparent);
      animation:shimmer 1.5s linear infinite;
    }
    .card-header {
      display:flex; align-items:center; padding:12px 14px; gap:12px; cursor:pointer;
    }
    .card-header:active { opacity:0.8; }
    .card-emoji { font-size:18px; flex-shrink:0; }
    .card-info { flex:1; min-width:0; }
    .card-tag { font-family:'JetBrains Mono',monospace; font-size:8px; color:var(--gold-dim); letter-spacing:0.2em; margin-bottom:2px; }
    .card-name { font-family:'Cinzel',serif; font-size:12px; color:var(--gold3); font-weight:600; }
    .card-metrics { display:flex; gap:8px; align-items:center; flex-shrink:0; }
    .metric-pill {
      background:#0a0800; border:1px solid #2a2010; border-radius:6px;
      padding:4px 8px; text-align:center; min-width:52px;
    }
    .metric-pill-label { font-family:'JetBrains Mono',monospace; font-size:7px; color:var(--muted); letter-spacing:0.1em; }
    .metric-pill-val { font-family:'Cinzel',serif; font-size:11px; font-weight:600; }
    .metric-pill-val.green { color:var(--green); }
    .metric-pill-val.red { color:var(--red); }
    .metric-pill-val.gold { color:var(--gold); }
    .expand-btn {
      width:24px; height:24px; border-radius:50%; border:1px solid #2a2010;
      background:transparent; color:var(--gold-dim); font-size:10px;
      display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0;
    }

    /* EXPANDED CARD */
    .card-body { display:none; border-top:1px solid #1a1500; padding:14px; }
    .card-body.open { display:block; animation:fadeUp 0.3s ease; }

    /* PROGRESS BAR */
    .progress-section { margin-bottom:14px; }
    .progress-label { display:flex; justify-content:space-between; margin-bottom:6px; }
    .progress-label span { font-family:'JetBrains Mono',monospace; font-size:9px; color:var(--muted); }
    .progress-track { height:4px; background:#1a1500; border-radius:2px; overflow:hidden; }
    .progress-fill { height:100%; background:linear-gradient(90deg,#8a6820,#E8C870); border-radius:2px; transition:width 0.5s ease; }

    /* FUND INPUTS */
    .fund-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:12px; }
    .fund-input-wrap { }
    .fund-label { font-family:'JetBrains Mono',monospace; font-size:8px; color:var(--muted); letter-spacing:0.1em; margin-bottom:4px; }
    .fund-input {
      width:100%; background:#080600; border:1px solid #2a2010; border-radius:8px;
      padding:8px 10px; color:var(--text); font-size:13px; font-family:'Cinzel',serif;
      text-align:center;
    }
    .fund-input:focus { outline:none; border-color:var(--gold); }
    .fund-save-btn {
      width:100%; padding:8px; background:linear-gradient(135deg,#8a6820,#C9A84C);
      border:none; border-radius:8px; color:#000; font-family:'Cinzel',serif;
      font-weight:700; font-size:10px; letter-spacing:0.1em; cursor:pointer; margin-bottom:12px;
    }

    /* AI INPUT */
    .ai-divider { height:1px; background:linear-gradient(90deg,transparent,#2a2010,transparent); margin-bottom:12px; }
    .ai-label { font-family:'JetBrains Mono',monospace; font-size:8px; color:var(--gold-dim); letter-spacing:0.2em; margin-bottom:8px; }
    .ai-textarea {
      width:100%; background:#080600; border:1px solid #2a2010; border-radius:10px;
      padding:12px; color:var(--text); font-size:13px; resize:none;
      font-family:'DM Sans',sans-serif; line-height:1.5; min-height:70px;
    }
    .ai-textarea:focus { outline:none; border-color:var(--gold); }
    .ai-run-btn {
      margin-top:8px; width:100%; padding:11px; border:none; border-radius:10px;
      font-family:'Cinzel',serif; font-weight:700; font-size:11px; letter-spacing:0.1em;
      cursor:pointer; background:linear-gradient(135deg,#8a6820,#C9A84C,#8a6820);
      color:#000; transition:all 0.2s;
    }
    .ai-run-btn:disabled { background:#1a1500; color:#3a3020; cursor:not-allowed; }
    .ai-output {
      margin-top:10px; background:#050400; border:1px solid #2a2010; border-radius:10px;
      padding:14px; font-size:12px; line-height:1.8; color:#998870;
      white-space:pre-wrap; word-break:break-word; display:none;
    }
    .ai-output.show { display:block; animation:fadeUp 0.4s ease; }

    /* STANDBY CARD */
    .standby-card {
      background:#080600; border:1px dashed #2a2010; border-radius:14px;
      padding:16px; text-align:center; cursor:pointer; transition:all 0.2s;
    }
    .standby-card:active { opacity:0.7; }
    .standby-icon { font-size:24px; margin-bottom:8px; opacity:0.4; }
    .standby-text { font-family:'Cinzel',serif; font-size:11px; color:#3a3020; letter-spacing:0.1em; }

    /* EMPIRE MODE */
    .empire-input-wrap {
      background:linear-gradient(135deg,#0d0b06,#080600);
      border:1px solid #2a2010; border-radius:14px; padding:16px; margin-bottom:14px;
    }
    .empire-input-title { font-family:'Cinzel',serif; font-size:12px; color:var(--gold); letter-spacing:0.1em; margin-bottom:10px; }
    .empire-textarea {
      width:100%; background:#080600; border:1px solid #2a2010; border-radius:10px;
      padding:12px; color:var(--text); font-size:13px; resize:none;
      font-family:'DM Sans',sans-serif; line-height:1.5; min-height:80px;
    }
    .empire-textarea:focus { outline:none; border-color:var(--gold); }
    .empire-deploy-btn {
      margin-top:10px; width:100%; padding:13px; border:none; border-radius:10px;
      font-family:'Cinzel',serif; font-weight:700; font-size:12px; letter-spacing:0.1em;
      cursor:pointer; color:#000;
      background:linear-gradient(135deg,#5a4010,#C9A84C,#E8C870,#C9A84C,#5a4010);
      background-size:200% auto;
    }
    .empire-deploy-btn:disabled { background:#1a1500; color:#3a3020; cursor:not-allowed; }
    .empire-output-card {
      background:linear-gradient(135deg,#0d0b06,#080600);
      border-radius:12px; padding:14px; margin-bottom:10px;
      border-left:2px solid var(--gold); animation:fadeUp 0.4s ease;
    }
    .empire-output-header { display:flex; align-items:center; gap:8px; margin-bottom:10px; }
    .empire-output-text { font-size:12px; line-height:1.8; color:#998870; white-space:pre-wrap; word-break:break-word; }

    /* ASSIGN */
    .assign-form { padding:14px; border-top:1px solid #1a1500; animation:fadeUp 0.3s ease; }
    .assign-input {
      width:100%; background:#080600; border:1px solid #2a2010; border-radius:8px;
      padding:10px 12px; color:var(--text); font-size:13px; margin-bottom:8px;
      font-family:'DM Sans',sans-serif;
    }
    .assign-input:focus { outline:none; border-color:var(--gold); }
    .assign-confirm-btn {
      width:100%; padding:10px; background:linear-gradient(135deg,#8a6820,#C9A84C);
      border:none; border-radius:8px; color:#000; font-family:'Cinzel',serif;
      font-weight:700; font-size:11px; letter-spacing:0.08em; cursor:pointer;
    }

    .spinner { width:13px; height:13px; border:2px solid #2a2010; border-top-color:var(--gold); border-radius:50%; animation:spin 0.7s linear infinite; display:inline-block; vertical-align:middle; }
    .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:#0d0b06; border:1px solid var(--gold); border-radius:20px; padding:10px 20px; font-size:12px; color:var(--gold2); z-index:999; animation:fadeUp 0.3s ease; white-space:nowrap; font-family:'JetBrains Mono',monospace; }
  </style>
</head>
<body>

<!-- SETUP -->
<div id="setup">
  <div class="setup-crown">👑</div>
  <div class="setup-title">GRAND REGENT</div>
  <div class="setup-sub2">COMMAND CENTER</div>
  <div class="setup-steps">
    <div class="setup-step">
      <div class="step-num">I</div>
      <div class="step-text">Go to <a href="https://aistudio.google.com" target="_blank">aistudio.google.com</a> → sign in with Gmail</div>
    </div>
    <div class="setup-step">
      <div class="step-num">II</div>
      <div class="step-text">Tap <strong style="color:#C9A84C">"Get API Key"</strong> → <strong style="color:#C9A84C">"Create API key"</strong> → copy it</div>
    </div>
    <div class="setup-step">
      <div class="step-num">III</div>
      <div class="step-text">Paste below. Stored only on this device. Never transmitted.</div>
    </div>
  </div>
  <input class="setup-input" id="api-key-input" type="password" placeholder="AIza..." />
  <button class="setup-btn" onclick="saveKey()">ENTER THE COMMAND CENTER</button>
  <p class="setup-note">// KEY STORED LOCALLY — NEVER SHARED — FREE TIER ACTIVE</p>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-crown">👑</div>
      <div>
        <div class="topbar-title">GRAND REGENT</div>
        <div class="topbar-sub">EMPIRE COMMAND CENTER</div>
      </div>
    </div>
    <div class="topbar-right">
      <button class="nav-btn active" id="btn-command" onclick="setView('command')">COMMAND</button>
      <button class="nav-btn" id="btn-empire" onclick="setView('empire')">⚡ DEPLOY</button>
      <button class="gear-btn" onclick="resetKey()">⚙</button>
    </div>
  </div>
  <div class="main" id="main"></div>
</div>

<script>
const AGENTS = [
  { id:'orchestrator', name:'Empire Orchestrator', emoji:'👑', tag:'MASTER CONTROL',
    prompt:`You are the Grand Regent — Master Orchestrator of a 9-agent online income empire. Agents: Risk Manager, Dropship Store, Video Content, Trading Advisor, Innovation, Trend Spotter, and 2 Standby. When given any goal: 1) Empire-wide strategic plan, 2) Agent activation order, 3) Priorities and timeline, 4) Risk flags, 5) Next 3 moves. Be decisive. Think like a billionaire CEO. Use clear sections.` },
  { id:'risk', name:'Risk Manager', emoji:'⚠️', tag:'RISK CONTROL',
    prompt:`You are a risk management expert for a South African digital entrepreneur. For any decision or plan: 1) Risk rating (Low/Medium/High/Critical), 2) Top 5 specific risks, 3) Worst-case scenario, 4) Best-case scenario, 5) 3 mitigation strategies, 6) GO/WAIT/NO-GO verdict. Be brutally honest.` },
  { id:'dropship', name:'Dropship Store', emoji:'🛒', tag:'STORE OPS',
    prompt:`You are a dropshipping expert for 2025. Given a niche/product: 1) Top 3 winning products with demand signals, 2) Pricing strategy with margins, 3) Ready Shopify listing (title, description, 5 bullets), 4) Upsell opportunities, 5) Best platform. Focus on SA and global markets.` },
  { id:'video', name:'Video Content', emoji:'🎬', tag:'MEDIA OPS',
    prompt:`You are a viral TikTok & YouTube strategist. Given a product/niche: 1) 3 TikTok concepts (format, hook, script, caption, hashtags), 2) 2 YouTube concepts (title, thumbnail, script outline, tags), 3) Free AI tools to produce content (CapCut, Pictory, HeyGen, ElevenLabs, RunwayML), 4) Posting schedule, 5) Monetization roadmap.` },
  { id:'trading', name:'Trading Advisor', emoji:'📈', tag:'TRADING OPS',
    prompt:`You are a trading analyst (crypto, forex, stocks). DISCLAIMER: AI only, not financial advice. For any asset/question: 1) Market sentiment, 2) Key support/resistance, 3) Entry points and targets, 4) Stop-loss levels, 5) Risk/reward ratio, 6) News catalysts, 7) Strategy recommendation. Always emphasize risk management.` },
  { id:'innovation', name:'Innovation Agent', emoji:'💡', tag:'R&D OPS',
    prompt:`You are an innovation expert for digital entrepreneurs in South Africa starting with almost nothing. Generate: 1) 5 fresh unconventional income ideas, 2) For each: concept, startup cost in Rands, time to first income, difficulty, income potential, 3) Best idea for near-zero budget, 4) 7-day action plan for that idea, 5) Free tools needed.` },
  { id:'trends', name:'Trend Spotter', emoji:'🔎', tag:'INTEL OPS',
    prompt:`You are a product trend analyst for dropshipping in 2025. For any niche: 1) Top 7 trending products NOW with evidence, 2) For each: trend stage, audience, price, why it's hot, 3) Top 3 to add to store immediately, 4) Upcoming trends next 30-60 days, 5) Platforms where trends are biggest.` },
  { id:'standbyA', name:'Standby Agent A', emoji:'🔒', tag:'UNASSIGNED', standby:true, prompt:'' },
  { id:'standbyB', name:'Standby Agent B', emoji:'🔒', tag:'UNASSIGNED', standby:true, prompt:'' },
];

let apiKey = localStorage.getItem('gr_key') || '';
let currentView = 'command';
let expandedCard = null;
let funds = JSON.parse(localStorage.getItem('gr_funds') || '{}');
let customAgents = JSON.parse(localStorage.getItem('gr_custom') || '{}');

AGENTS.forEach(a => {
  if (customAgents[a.id]) { Object.assign(a, customAgents[a.id]); a.standby = false; }
  if (!funds[a.id]) funds[a.id] = { revenue:0, spent:0 };
});

window.onload = () => { if (apiKey) showApp(); };

function saveKey() {
  const val = document.getElementById('api-key-input').value.trim();
  if (!val || !val.startsWith('AIza')) { showToast('⚠ Key must start with AIza...'); return; }
  localStorage.setItem('gr_key', val); apiKey = val; showApp();
}
function resetKey() { if(confirm('Reset API key?')){ localStorage.removeItem('gr_key'); location.reload(); } }
function showApp() {
  document.getElementById('setup').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  render();
}
function setView(v) {
  currentView = v; expandedCard = null;
  document.getElementById('btn-command').classList.toggle('active', v==='command');
  document.getElementById('btn-empire').classList.toggle('active', v==='empire');
  render();
}

function getTotals() {
  let rev=0, spent=0;
  AGENTS.forEach(a => { rev += parseFloat(funds[a.id]?.revenue||0); spent += parseFloat(funds[a.id]?.spent||0); });
  return { rev, spent, profit: rev - spent };
}

function render() {
  document.getElementById('main').innerHTML = currentView === 'command' ? renderCommand() : renderEmpire();
}

function renderCommand() {
  const t = getTotals();
  const fmt = n => `R${parseFloat(n).toLocaleString('en-ZA',{minimumFractionDigits:0,maximumFractionDigits:0})}`;

  const statsBar = `
    <div class="empire-stats">
      <div class="stat-card">
        <div class="stat-label">WEEKLY REV</div>
        <div class="stat-value green">${fmt(t.rev)}</div>
        <div class="stat-change">↑ this week</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">PROFIT</div>
        <div class="stat-value ${t.profit>=0?'green':'red'}">${fmt(t.profit)}</div>
        <div class="stat-change">${t.profit>=0?'▲ positive':'▼ negative'}</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">SPENT</div>
        <div class="stat-value gold">${fmt(t.spent)}</div>
        <div class="stat-change">↓ expenses</div>
      </div>
    </div>`;

  const activeAgents = AGENTS.filter(a => !a.standby);
  const standbyAgents = AGENTS.filter(a => a.standby);

  const agentCards = activeAgents.map(a => {
    const f = funds[a.id] || {revenue:0, spent:0};
    const profit = parseFloat(f.revenue||0) - parseFloat(f.spent||0);
    const isExpanded = expandedCard === a.id;
    const maxRev = Math.max(...AGENTS.map(x => parseFloat(funds[x.id]?.revenue||0)), 1);
    const progress = Math.min((parseFloat(f.revenue||0) / maxRev) * 100, 100);

    return `
      <div class="command-card${isExpanded?' selected':''}" id="card-${a.id}">
        <div class="card-header" onclick="toggleCard('${a.id}')">
          <div class="card-emoji">${a.emoji}</div>
          <div class="card-info">
            <div class="card-tag">${a.tag}</div>
            <div class="card-name">${a.name}</div>
          </div>
          <div class="card-metrics">
            <div class="metric-pill">
              <div class="metric-pill-label">REV</div>
              <div class="metric-pill-val green">R${parseFloat(f.revenue||0).toFixed(0)}</div>
            </div>
            <div class="metric-pill">
              <div class="metric-pill-label">P/L</div>
              <div class="metric-pill-val ${profit>=0?'green':'red'}">R${profit.toFixed(0)}</div>
            </div>
          </div>
          <button class="expand-btn">${isExpanded?'▲':'▼'}</button>
        </div>
        <div class="card-body${isExpanded?' open':''}" id="body-${a.id}">
          <div class="progress-section">
            <div class="progress-label"><span>WEEKLY REVENUE SHARE</span><span>${progress.toFixed(0)}%</span></div>
            <div class="progress-track"><div class="progress-fill" style="width:${progress}%"></div></div>
          </div>
          <div class="fund-grid">
            <div class="fund-input-wrap">
              <div class="fund-label">REVENUE (R)</div>
              <input class="fund-input" type="number" id="rev-${a.id}" value="${f.revenue||0}" placeholder="0" />
            </div>
            <div class="fund-input-wrap">
              <div class="fund-label">SPENT (R)</div>
              <input class="fund-input" type="number" id="spent-${a.id}" value="${f.spent||0}" placeholder="0" />
            </div>
            <div class="fund-input-wrap">
              <div class="fund-label">PROFIT (R)</div>
              <input class="fund-input" type="number" id="profit-${a.id}" value="${profit.toFixed(0)}" readonly style="color:${profit>=0?'var(--green)':'var(--red)'};" />
            </div>
          </div>
          <button class="fund-save-btn" onclick="saveFunds('${a.id}')">SAVE FUNDS</button>
          <div class="ai-divider"></div>
          <div class="ai-label">// CONSULT ${a.tag}</div>
          <textarea class="ai-textarea" id="input-${a.id}" placeholder="Ask ${a.name} anything..." rows="3"></textarea>
          <button class="ai-run-btn" id="run-${a.id}" onclick="runAgent('${a.id}')">DEPLOY ${a.name.toUpperCase()} →</button>
          <div class="ai-output" id="output-${a.id}"></div>
        </div>
      </div>`;
  }).join('');

  const standbyCards = standbyAgents.map(a => `
    <div class="standby-card" onclick="openAssign('${a.id}')">
      <div class="standby-icon">${a.emoji}</div>
      <div class="standby-text">STANDBY UNIT — TAP TO COMMISSION</div>
    </div>
    <div id="assign-${a.id}" style="display:none">
      <div class="assign-form" style="background:#0a0800;border:1px solid #2a2010;border-radius:14px;margin-top:-4px;">
        <input class="assign-input" id="aname-${a.id}" placeholder="Agent name..." />
        <input class="assign-input" id="adesc-${a.id}" placeholder="Short description..." />
        <textarea class="assign-input" id="arole-${a.id}" rows="3" placeholder="Full role instructions for this agent..."></textarea>
        <button class="assign-confirm-btn" onclick="assignAgent('${a.id}')">COMMISSION AGENT →</button>
      </div>
    </div>`).join('');

  return `
    ${statsBar}
    <div class="section-title">ACTIVE UNITS</div>
    <div class="command-grid">${agentCards}</div>
    <div class="section-title">STANDBY UNITS</div>
    <div class="command-grid">${standbyCards}`;
}

function renderEmpire() {
  return `
    <div class="empire-input-wrap">
      <div class="empire-input-title">⚡ FULL EMPIRE DEPLOYMENT</div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--muted);margin-bottom:10px">ALL ACTIVE AGENTS MOBILIZE ON A SINGLE DIRECTIVE</div>
      <textarea class="empire-textarea" id="empire-input"
        placeholder="State your directive... e.g. I want to sell wireless earbuds via dropshipping and build a TikTok/YouTube presence"
        rows="4"></textarea>
      <button class="empire-deploy-btn" id="empire-btn" onclick="runEmpire()">
        ⚡ MOBILIZE ALL UNITS →
      </button>
    </div>
    <div id="empire-output"></div>`;
}

function toggleCard(id) {
  expandedCard = expandedCard === id ? null : id;
  render();
  if (expandedCard) {
    setTimeout(() => {
      document.getElementById(`card-${id}`)?.scrollIntoView({behavior:'smooth', block:'nearest'});
    }, 100);
  }
}

function saveFunds(id) {
  const rev = parseFloat(document.getElementById(`rev-${id}`)?.value||0);
  const spent = parseFloat(document.getElementById(`spent-${id}`)?.value||0);
  funds[id] = { revenue: rev, spent };
  localStorage.setItem('gr_funds', JSON.stringify(funds));
  showToast('✓ FUNDS UPDATED');
  render();
  expandedCard = id;
  render();
}

function openAssign(id) {
  const el = document.getElementById(`assign-${id}`);
  if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

function assignAgent(id) {
  const name = document.getElementById(`aname-${id}`)?.value?.trim();
  const desc = document.getElementById(`adesc-${id}`)?.value?.trim();
  const role = document.getElementById(`arole-${id}`)?.value?.trim();
  if (!name || !role) { showToast('⚠ Fill name and role'); return; }
  const agent = AGENTS.find(a => a.id === id);
  const update = { name, desc: desc||name, prompt: role, emoji:'⚡', tag:'COMMISSIONED', standby:false };
  Object.assign(agent, update);
  customAgents[id] = update;
  localStorage.setItem('gr_custom', JSON.stringify(customAgents));
  if (!funds[id]) funds[id] = {revenue:0, spent:0};
  showToast(`✓ ${name} COMMISSIONED`);
  render();
}

async function callGemini(prompt, message) {
  const res = await fetch(
    `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`,
    { method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ contents:[{parts:[{text:`${prompt}\n\nDirective: ${message}`}]}], generationConfig:{maxOutputTokens:1200,temperature:0.8} }) }
  );
  const d = await res.json();
  if (d.error) throw new Error(d.error.message);
  return d.candidates?.[0]?.content?.parts?.[0]?.text || 'No response.';
}

async function runAgent(id) {
  const agent = AGENTS.find(a => a.id === id);
  const input = document.getElementById(`input-${id}`)?.value?.trim();
  if (!input) { showToast('⚠ State your directive first'); return; }
  const btn = document.getElementById(`run-${id}`);
  const out = document.getElementById(`output-${id}`);
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> PROCESSING...';
  out.style.display = 'block'; out.classList.add('show');
  out.innerHTML = '<span style="color:#3a3020;animation:pulse 1s infinite;display:inline-block">ANALYZING...</span>';
  try {
    const result = await callGemini(agent.prompt, input);
    out.innerHTML = esc(result);
    out.style.color = '#998870';
  } catch(e) {
    out.innerHTML = `⚠ ${e.message}`;
    out.style.color = 'var(--red)';
  }
  btn.disabled = false;
  btn.innerHTML = `DEPLOY ${agent.name.toUpperCase()} →`;
}

async function runEmpire() {
  const input = document.getElementById('empire-input')?.value?.trim();
  if (!input) { showToast('⚠ State your directive'); return; }
  const btn = document.getElementById('empire-btn');
  btn.disabled = true; btn.innerHTML = '⚡ MOBILIZING...';
  const out = document.getElementById('empire-output');
  out.innerHTML = '';
  const active = AGENTS.filter(a => !a.standby);
  let ctx = '';
  for (let i = 0; i < active.length; i++) {
    const a = active[i];
    const cardId = `empire-${a.id}`;
    out.innerHTML += `
      <div class="empire-output-card" id="${cardId}">
        <div class="empire-output-header">
          <span>${a.emoji}</span>
          <span style="font-family:'Cinzel',serif;font-weight:600;font-size:11px;color:var(--gold2)">${a.name}</span>
          <span style="font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--muted);margin-left:auto">${a.tag}</span>
          <span><span class="spinner"></span></span>
        </div>
        <div style="color:#3a3020;font-size:12px;animation:pulse 1s infinite">PROCESSING DIRECTIVE...</div>
      </div>`;
    document.getElementById(cardId)?.scrollIntoView({behavior:'smooth',block:'nearest'});
    try {
      const result = await callGemini(a.prompt, (ctx?`Strategic context:\n${ctx}\n\n`:'')+input);
      if (i===0) ctx = result;
      document.getElementById(cardId).innerHTML = `
        <div class="empire-output-header">
          <span>${a.emoji}</span>
          <span style="font-family:'Cinzel',serif;font-weight:600;font-size:11px;color:var(--gold2)">${a.name}</span>
          <span style="font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--muted);margin-left:auto">${a.tag}</span>
          <span style="font-family:'JetBrains Mono',monospace;font-size:8px;color:var(--green)">COMPLETE ✓</span>
        </div>
        <div class="empire-output-text">${esc(result)}</div>`;
    } catch(e) {
      document.getElementById(cardId).innerHTML = `
        <div class="empire-output-header"><span>${a.emoji}</span><span style="font-family:'Cinzel',serif;font-size:11px;color:var(--gold2)">${a.name}</span></div>
        <div style="color:var(--red);font-size:12px">⚠ ${e.message}</div>`;
    }
  }
  btn.disabled = false; btn.innerHTML = '⚡ MOBILIZE ALL UNITS →';
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 2500);
}
</script>
</body>
</html>
